services:
  db:
    image: postgres:16-alpine
    container_name: students_life_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: students_life
      POSTGRES_USER: students_life_user
      POSTGRES_PASSWORD: students_life_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: students_life_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: students_life_backend
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis

volumes:
  postgres_data: